<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1:1 문의하기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF3B30;
    --bg: #F4F4F6;
    --card: #FFFFFF;
    --border: #EBEBEC;
    --text-primary: #111112;
    --text-secondary: #6B6B70;
    --text-muted: #ABABAF;
    --shadow: 0 1px 6px rgba(0,0,0,0.06);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–bg);
display: flex;
justify-content: center;
min-height: 100vh;
}

.frame {
width: 100%;
max-width: 390px;
min-height: 100vh;
background: var(–bg);
display: flex;
flex-direction: column;
}

.header {
background: var(–card);
padding: 18px 20px 16px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
z-index: 100;
}

.back-btn {
width: 36px;
height: 36px;
background: none;
border: none;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: var(–text-primary);
}

.back-btn:active { opacity: 0.5; }

.header-title {
font-size: 18px;
font-weight: 700;
color: var(–text-primary);
letter-spacing: -0.4px;
flex: 1;
}

/* ── PAGE SWITCH ── */
.page { display: none; flex-direction: column; flex: 1; }
.page.active { display: flex; }

/* ── SCROLL ── */
.scroll {
flex: 1;
overflow-y: auto;
padding: 16px;
display: flex;
flex-direction: column;
gap: 10px;
}

.scroll.pb { padding-bottom: 100px; }

/* ── EMPTY STATE ── */
.empty {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 10px;
padding-bottom: 60px;
}

.empty-icon {
width: 56px;
height: 56px;
background: var(–border);
border-radius: 18px;
display: flex;
align-items: center;
justify-content: center;
color: var(–text-muted);
margin-bottom: 4px;
}

.empty-text {
font-size: 15px;
font-weight: 600;
color: var(–text-secondary);
}

.empty-sub {
font-size: 13px;
color: var(–text-muted);
}

/* ── LIST CARD ── */
.inquiry-card {
background: var(–card);
border-radius: 18px;
box-shadow: var(–shadow);
overflow: hidden;
animation: fadeUp 0.3s ease both;
}

.inquiry-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px;
border-bottom: 1px solid var(–border);
cursor: pointer;
transition: background 0.12s;
gap: 12px;
}

.inquiry-item:last-child { border-bottom: none; }
.inquiry-item:active { background: var(–bg); }

.inquiry-item-left {
flex: 1;
display: flex;
flex-direction: column;
gap: 5px;
min-width: 0;
}

.inquiry-item-top {
display: flex;
align-items: center;
gap: 8px;
}

.inquiry-title {
font-size: 14px;
font-weight: 600;
color: var(–text-primary);
letter-spacing: -0.2px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
flex: 1;
}

.status-badge {
font-size: 11px;
font-weight: 600;
padding: 2px 8px;
border-radius: 20px;
flex-shrink: 0;
}

.status-badge.waiting {
background: var(–bg);
color: var(–text-muted);
}

.status-badge.answered {
background: #FFF0EE;
color: var(–primary);
}

.inquiry-date {
font-size: 12px;
color: var(–text-muted);
}

.inquiry-chevron { color: var(–text-muted); flex-shrink: 0; }

/* ── WRITE PAGE ── */
.section-group {
background: var(–card);
border-radius: 18px;
box-shadow: var(–shadow);
padding: 20px;
display: flex;
flex-direction: column;
gap: 18px;
animation: fadeUp 0.3s ease both;
}

.field {
display: flex;
flex-direction: column;
gap: 6px;
}

.field-label {
font-size: 13px;
font-weight: 500;
color: var(–text-secondary);
}

.input {
width: 100%;
padding: 13px 16px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: var(–bg);
font-size: 14px;
color: var(–text-primary);
font-family: ‘Noto Sans KR’, sans-serif;
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
}

.input::placeholder { color: var(–text-muted); }

.input:focus {
background: #fff;
outline: none;
}

.textarea:focus {
background: #fff;
outline: none;
}

.textarea {
width: 100%;
padding: 13px 16px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: var(–bg);
font-size: 14px;
color: var(–text-primary);
font-family: ‘Noto Sans KR’, sans-serif;
outline: none;
resize: none;
height: 160px;
line-height: 1.7;
transition: border-color 0.2s, box-shadow 0.2s;
}

.textarea::placeholder { color: var(–text-muted); }

.textarea:focus {
background: #fff;
outline: none;
}

.char-count {
font-size: 12px;
color: var(–text-muted);
text-align: right;
margin-top: -10px;
}

.info-box {
padding: 14px 16px;
background: #FFF2F1;
border: 1px solid #FFCFCC;
border-radius: 12px;
}

.info-box-header {
display: flex;
align-items: center;
gap: 6px;
margin-bottom: 10px;
}

.info-box-icon {
width: 18px;
height: 18px;
background: var(–primary);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}

.info-box-title {
font-size: 13px;
font-weight: 600;
color: var(–primary);
}

.info-box-list {
display: flex;
flex-direction: column;
gap: 5px;
}

.info-box-item {
font-size: 12.5px;
color: var(–text-secondary);
line-height: 1.6;
padding-left: 10px;
position: relative;
}

.info-box-item::before {
content: ‘*’;
position: absolute;
left: 0;
color: var(–text-muted);
}

.info-box-item-red::before {
color: var(–primary);
}

/* ── DETAIL PAGE ── */
.detail-card {
background: var(–card);
border-radius: 18px;
box-shadow: var(–shadow);
overflow: hidden;
animation: fadeUp 0.3s ease both;
}

/* 질문 영역 */
.detail-q {
padding: 20px;
display: flex;
flex-direction: column;
gap: 8px;
}

.detail-meta {
display: flex;
align-items: center;
gap: 8px;
}

.detail-who {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.4px;
padding: 3px 9px;
border-radius: 20px;
background: var(–bg);
color: var(–text-muted);
}

.detail-who.answer {
background: #FFF0EE;
color: var(–primary);
}

.detail-date-sm {
font-size: 12px;
color: var(–text-muted);
}

.detail-title-text {
font-size: 15px;
font-weight: 700;
color: var(–text-primary);
letter-spacing: -0.3px;
line-height: 1.45;
}

.detail-body-text {
font-size: 14px;
color: var(–text-secondary);
line-height: 1.8;
white-space: pre-line;
margin-top: 2px;
}

/* 답변 영역 */
.detail-a {
padding: 20px;
display: flex;
flex-direction: column;
gap: 8px;
background: #FAFAFA;
border-top: 1px solid var(–border);
}

/* 답변 대기 */
.answer-pending {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
padding: 28px 20px;
background: #FAFAFA;
border-top: 1px solid var(–border);
}

.answer-pending-icon {
width: 40px;
height: 40px;
border-radius: 12px;
background: #F0F0F2;
display: flex;
align-items: center;
justify-content: center;
color: var(–text-muted);
margin-bottom: 2px;
}

.answer-pending-text {
font-size: 13px;
color: var(–text-muted);
font-weight: 500;
}

/* ── BOTTOM ACTION ── */
.bottom-action {
position: fixed;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100%;
max-width: 390px;
padding: 12px 16px 28px;
background: linear-gradient(transparent, var(–bg) 30%);
}

.bottom-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.btn-secondary {
padding: 16px;
border: 1.5px solid var(–border);
border-radius: 14px;
background: var(–card);
font-size: 15px;
font-weight: 600;
color: var(–text-secondary);
cursor: pointer;
font-family: ‘Noto Sans KR’, sans-serif;
box-shadow: var(–shadow);
transition: all 0.15s;
}

.btn-secondary:active { transform: scale(0.97); }

.btn-primary {
width: 100%;
padding: 16px;
border: none;
border-radius: 14px;
background: var(–primary);
font-size: 15px;
font-weight: 600;
color: white;
cursor: pointer;
font-family: ‘Noto Sans KR’, sans-serif;
box-shadow: 0 4px 14px rgba(255,59,48,0.35);
transition: all 0.15s;
}

.btn-primary:active { transform: scale(0.97); }

/* 페이지네이션 */
.pagination {
display: flex;
justify-content: center;
align-items: center;
gap: 4px;
padding: 16px 0 8px;
}

.page-btn {
width: 34px;
height: 34px;
border-radius: 10px;
border: none;
background: none;
font-size: 13px;
font-weight: 500;
color: var(–text-muted);
cursor: pointer;
font-family: ‘Noto Sans KR’, sans-serif;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
}

.page-btn:hover { background: var(–card); color: var(–text-primary); }
.page-btn.active { background: var(–primary); color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(255,59,48,0.3); }

.page-arrow {
width: 34px;
height: 34px;
border-radius: 10px;
border: 1.5px solid var(–border);
background: var(–card);
color: var(–text-muted);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
box-shadow: var(–shadow);
}

.page-arrow:disabled { opacity: 0.35; cursor: default; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<script>
  const PER_PAGE = 10;
  let currentPage = 1;
  let inquiries = [
    { title: '이전에 요청드렸던것 어떻게 됐을까요?', body: '지난번에 문의드린 내용인데 아직 처리가 안 된 것 같아서요. 확인 부탁드립니다.', date: '2026.03.09 15:13', status: 'waiting', answer: null },
    { title: '식권 사용 방법 문의', body: '식권을 처음 사용하는데 어떻게 사용하면 되나요?', date: '2026.03.08 10:22', status: 'answered', answer: { text: '안녕하세요! 올리브식권 고객센터입니다.\n\n식권 사용은 앱 하단 식권 탭에서 QR코드를 제시하시면 됩니다.\n\n추가 문의사항이 있으시면 언제든지 연락주세요 😊', date: '2026.03.08 14:05' } },
    { title: '포인트 충전 오류', body: '포인트 충전을 시도했는데 계속 오류가 납니다.', date: '2026.03.05 09:11', status: 'answered', answer: { text: '안녕하세요! 올리브식권 고객센터입니다.\n\n불편을 드려 죄송합니다. 현재 서버 점검 이후 정상화되었으니 다시 시도해 주세요.\n\n감사합니다.', date: '2026.03.05 11:30' } },
  ];

  function renderList(page) {
    currentPage = page;
    const start = (page - 1) * PER_PAGE;
    const items = inquiries.slice(start, start + PER_PAGE);
    const listEl = document.getElementById('inquiryList');
    const totalPages = Math.ceil(inquiries.length / PER_PAGE);

    if (inquiries.length === 0) {
      listEl.style.display = 'none';
      document.getElementById('pagination').innerHTML = '';
      // show empty
      let empty = document.getElementById('emptyState');
      if (!empty) {
        empty = document.createElement('div');
        empty.id = 'emptyState';
        empty.className = 'empty';
        empty.innerHTML = `
          <div class="empty-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <span class="empty-text">문의 내역이 없습니다</span>
          <span class="empty-sub">궁금한 점을 문의해 주세요</span>`;
        document.getElementById('listScroll').insertBefore(empty, document.getElementById('pagination'));
      }
      return;
    }

    const emptyEl = document.getElementById('emptyState');
    if (emptyEl) emptyEl.remove();
    listEl.style.display = '';

    listEl.innerHTML = items.map((n, i) => `
      <div class="inquiry-item" onclick="goDetail(${start + i})">
        <div class="inquiry-item-left">
          <div class="inquiry-item-top">
            <span class="status-badge ${n.status === 'waiting' ? 'waiting' : 'answered'}">${n.status === 'waiting' ? '답변대기' : '답변완료'}</span>
            <span class="inquiry-title">${n.title}</span>
          </div>
          <span class="inquiry-date">${n.date}</span>
        </div>
        <svg class="inquiry-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    `).join('');

    // pagination
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-arrow" onclick="renderList(${currentPage-1})" ${currentPage===1?'disabled':''}>
      <svg width="7" height="12" viewBox="0 0 9 15" fill="none"><path d="M8 1L1.5 7.5L8 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="renderList(${i})">${i}</button>`;
    }
    html += `<button class="page-arrow" onclick="renderList(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>
      <svg width="7" height="12" viewBox="0 0 9 15" fill="none"><path d="M1 1L7.5 7.5L1 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;
    pg.innerHTML = html;
  }

  function goList() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('listPage').classList.add('active');
    renderList(currentPage);
  }

  function goWrite() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('writePage').classList.add('active');
    document.getElementById('writeTitle').value = '';
    document.getElementById('writeBody').value = '';
    document.getElementById('charCount').textContent = '0';
  }

  function goDetail(index) {
    const n = inquiries[index];
    document.getElementById('detailTitle').textContent = n.title;
    document.getElementById('detailBody').textContent = n.body;
    document.getElementById('detailQDate').textContent = n.date;

    const answerArea = document.getElementById('detailAnswerArea');
    if (n.answer) {
      answerArea.innerHTML = `
        <div class="detail-a">
          <div class="detail-meta">
            <span class="detail-who answer">답변완료</span>
            <span class="detail-date-sm">${n.answer.date}</span>
          </div>
          <div class="detail-body-text">${n.answer.text}</div>
        </div>`;
    } else {
      answerArea.innerHTML = `
        <div class="answer-pending">
          <div class="answer-pending-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          </div>
          <span class="answer-pending-text">답변 준비 중입니다</span>
        </div>`;
    }

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('detailPage').classList.add('active');
  }

  function updateCount() {
    const body = document.getElementById('writeBody');
    const count = body.value.length;
    if (count > 500) body.value = body.value.slice(0, 500);
    document.getElementById('charCount').textContent = Math.min(count, 500);
  }

  function submitInquiry() {
    const title = document.getElementById('writeTitle').value.trim();
    const body = document.getElementById('writeBody').value.trim();
    if (!title) { alert('제목을 입력해주세요.'); return; }
    if (!body) { alert('내용을 입력해주세요.'); return; }

    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    inquiries.unshift({ title, body, date: dateStr, status: 'waiting', answer: null });
    goList();
  }

  renderList(1);
</script>
