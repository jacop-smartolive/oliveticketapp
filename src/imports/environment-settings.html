<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>환경설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF3B30;
    --bg: #F4F4F6;
    --card: #FFFFFF;
    --border: #EBEBEC;
    --text-primary: #111112;
    --text-secondary: #6B6B70;
    --text-muted: #ABABAF;
    --shadow: 0 1px 6px rgba(0,0,0,0.06);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–bg);
display: flex;
justify-content: center;
min-height: 100vh;
}

.frame {
width: 100%;
max-width: 390px;
min-height: 100vh;
background: var(–bg);
display: flex;
flex-direction: column;
}

.header {
background: var(–card);
padding: 18px 20px 16px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
z-index: 100;
}

.back-btn {
width: 36px;
height: 36px;
background: none;
border: none;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: var(–text-primary);
}

.back-btn:active { opacity: 0.5; }

.header-title {
font-size: 18px;
font-weight: 700;
color: var(–text-primary);
letter-spacing: -0.4px;
}

.scroll {
flex: 1;
overflow-y: auto;
padding: 20px 16px 120px;
display: flex;
flex-direction: column;
gap: 10px;
}

/* 섹션 그룹 */
.section-group {
background: var(–card);
border-radius: 18px;
box-shadow: var(–shadow);
overflow: hidden;
padding: 6px 20px;
animation: fadeUp 0.3s ease both;
}

.section-group:nth-child(2) { animation-delay: 0.05s; }
.section-group:nth-child(3) { animation-delay: 0.10s; }

/* 섹션 라벨 — 카드 바깥 */
.section-label {
font-size: 12px;
font-weight: 600;
color: var(–text-muted);
letter-spacing: 0.5px;
padding: 4px 4px 6px;
}

/* 설정 row — 구분선 없음 */
.setting-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 0;
background: #fff;
min-height: 50px;
}

.setting-label {
font-size: 14px;
font-weight: 500;
color: var(–text-primary);
}

/* 토글 */
.toggle {
position: relative;
width: 48px;
height: 28px;
flex-shrink: 0;
}

.toggle input {
opacity: 0;
width: 0;
height: 0;
position: absolute;
}

.toggle-track {
position: absolute;
inset: 0;
border-radius: 14px;
background: #D1D1D6;
cursor: pointer;
transition: background 0.2s;
}

.toggle-track::after {
content: ‘’;
position: absolute;
width: 22px;
height: 22px;
border-radius: 50%;
background: white;
top: 3px;
left: 3px;
transition: transform 0.2s;
box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.toggle input:checked + .toggle-track {
background: var(–primary);
}

.toggle input:checked + .toggle-track::after {
transform: translateX(20px);
}

/* 언어 row */
.lang-value {
display: flex;
align-items: center;
gap: 4px;
font-size: 14px;
font-weight: 500;
color: var(–text-secondary);
cursor: pointer;
}

/* 로그아웃/회원탈퇴 */
.bottom-links {
display: flex;
justify-content: center;
align-items: center;
padding: 4px 0;
}

.bottom-link {
font-size: 13px;
color: var(–text-muted);
padding: 4px 16px;
cursor: pointer;
transition: color 0.12s;
}

.bottom-link:active { color: var(–text-secondary); }

.bottom-divider {
width: 1px;
height: 12px;
background: var(–border);
}

/* 하단 고정 */
.bottom-action {
position: fixed;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100%;
max-width: 390px;
padding: 12px 16px 28px;
background: linear-gradient(transparent, var(–bg) 30%);
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.btn-secondary {
padding: 16px;
border: 1.5px solid var(–border);
border-radius: 14px;
background: var(–card);
font-size: 15px;
font-weight: 600;
color: var(–text-secondary);
cursor: pointer;
font-family: ‘Noto Sans KR’, sans-serif;
box-shadow: var(–shadow);
transition: all 0.15s;
}

.btn-secondary:active { transform: scale(0.97); }

.btn-primary {
padding: 16px;
border: none;
border-radius: 14px;
background: var(–primary);
font-size: 15px;
font-weight: 600;
color: white;
cursor: pointer;
font-family: ‘Noto Sans KR’, sans-serif;
box-shadow: 0 4px 14px rgba(255,59,48,0.35);
transition: all 0.15s;
}

.btn-primary:active { transform: scale(0.97); }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

      </svg>
    </button>
    <span class="header-title">환경설정</span>
  </div>
