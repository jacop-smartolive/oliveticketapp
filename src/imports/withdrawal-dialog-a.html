<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원탈퇴 다이얼로그 A안</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --brand: #E8192C;
    --brand-soft: rgba(232,25,44,0.08);
    --olive: #5A8A3C;
    --olive-soft: rgba(90,138,60,0.10);
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --surface2: #F7F7FA;
    --text-1: #1C1C1E;
    --text-2: #48484A;
    --text-3: #8E8E93;
    --sep: rgba(0,0,0,0.08);
    --r-md: 16px;
    --r-lg: 22px;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Phone ── */
  .phone {
    width: 375px;
    height: 812px;
    background: var(--bg);
    border-radius: 54px;
    border: 10px solid #1C1C1E;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 40px 100px rgba(0,0,0,0.30),
      inset 0 1px 0 rgba(255,255,255,0.10);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 30px;
    background: #1C1C1E;
    border-radius: 0 0 20px 20px;
    z-index: 100;
  }

  /* settings header */
  .s-header {
    position: absolute;
    top: 30px; left: 0; right: 0;
    height: 56px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(242,242,247,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--sep);
    z-index: 5;
  }
  .back-btn {
    position: absolute; left: 16px;
    width: 32px; height: 32px;
    background: var(--brand);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .back-btn svg { width: 14px; height: 14px; }
  .s-title { font-size: 15px; font-weight: 600; color: var(--text-1); }

  /* list */
  .s-list {
    position: absolute;
    top: 86px; left: 0; right: 0;
    padding: 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .s-row {
    background: white;
    padding: 16px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 500; color: var(--text-1);
  }
  .s-row.danger { color: var(--brand); }
  .s-row .chevron { color: var(--text-3); font-size: 13px; }

  /* overlay */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }

  /* ── Dialog ── */
  .dialog {
    width: 295px;
    background: white;
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: 0 28px 72px rgba(0,0,0,0.22), 0 4px 16px rgba(0,0,0,0.10);
    animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.84) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .d-body {
    padding: 28px 22px 0;
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }

  .icon-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FFE8EA 0%, #FFD5D8 100%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .icon-circle svg { width: 30px; height: 30px; }

  .d-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-1);
    margin-bottom: 8px;
    line-height: 1.35;
  }

  .d-desc {
    font-size: 12px;
    line-height: 1.75;
    color: var(--text-3);
    margin-top: 10px;
    text-align: center;
  }

  /* point block */
  .point-block {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid rgba(0,0,0,0.10);
    border-radius: var(--r-md);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
  }

  .p-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--text-3);
  }
  .p-label svg { width: 14px; height: 14px; }

  .p-value {
    font-size: 16px; font-weight: 700;
    color: var(--text-1);
    letter-spacing: -0.03em;
    display: flex; align-items: baseline; gap: 2px;
  }
  .p-value span { font-size: 12px; font-weight: 600; }

  /* note */
  .d-note {
    font-size: 11px;
    color: var(--text-3);
    line-height: 1.6;
    text-align: center;
    padding: 0 4px;
  }

  /* buttons */
  .d-actions {
    padding: 16px 20px 22px;
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 14px;
  }

  .btn {
    width: 100%;
    padding: 15px;
    border-radius: var(--r-md);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: none;
    letter-spacing: -0.01em;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.88; }

  .btn-red {
    background: var(--brand);
    color: white;
    box-shadow: 0 5px 18px rgba(232,25,44,0.30);
  }
  .btn-cancel {
    background: var(--surface2);
    color: var(--text-3);
  }

  .warn-banner {
    width: 100%;
    background: rgba(232,25,44,0.07);
    border: 1.5px solid rgba(232,25,44,0.18);
    border-radius: var(--r-md);
    padding: 11px 14px;
    display: flex;
    align-items: flex-start;
    gap: 7px;
    margin-top: 8px;
    text-align: left;
  }
  .warn-banner svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
  .warn-banner p { font-size: 12px; line-height: 1.65; color: var(--brand); font-weight: 500; }

  .btn-olive {
    background: var(--olive);
    color: white;
    box-shadow: 0 5px 16px rgba(90,138,60,0.28);
  }
</style>
</head>
<body>

<div class="phone">
  <!-- notch via ::before -->

  <!-- header -->
  <div class="s-header">
    <div class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <span class="s-title">환경설정</span>
  </div>

  <!-- list -->
  <div class="s-list">
    <div class="s-row">사원증 / QR스티커 관리 <span class="chevron">›</span></div>
    <div class="s-row">비밀번호 변경 <span class="chevron">›</span></div>
    <div class="s-row danger">회원탈퇴 <span class="chevron">›</span></div>
  </div>

  <!-- overlay + dialog -->
  <div class="overlay">
    <div class="dialog">

      <div class="d-body">
        <!-- 경고 아이콘 -->
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E8192C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>

        <p class="d-title">회원탈퇴를 하시겠습니까?</p>

        <!-- 잔여 포인트 -->
        <div class="point-block">
          <span class="p-label">잔여 올리브 포인트</span>
          <span class="p-value">12,500</span>
        </div>

        <!-- 경고 배너 -->
        <div class="warn-banner">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E8192C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>탈퇴 전 반드시 포인트를 환불해 주세요.<br>탈퇴 후에는 포인트가 소멸됩니다.</p>
        </div>
      </div>

      <div class="d-actions">
        <button class="btn btn-red">회원탈퇴</button>
        <button class="btn btn-cancel">취소</button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
